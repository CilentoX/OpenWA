# OpenWA - Docker Compose Configuration
# Optimized for Coolify deployment (Coolify manages Traefik externally)

services:
  # ===== CORE: OpenWA Backend API =====
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    expose:
      - '2785'
    environment:
      # Core
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=2785
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Public URLs
      - BASE_URL=${BASE_URL:-https://api-openwa.qwertyatlas.online}
      - DASHBOARD_URL=${DASHBOARD_URL:-https://openwa.qwertyatlas.online}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://openwa.qwertyatlas.online}
      # Database
      - DATABASE_TYPE=${DATABASE_TYPE:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-openwa}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-openwa}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-openwa}
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-false}
      - DATABASE_LOGGING=${DATABASE_LOGGING:-false}
      # Engine
      - ENGINE_TYPE=${ENGINE_TYPE:-whatsapp-web.js}
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-true}
      - PUPPETEER_ARGS=${PUPPETEER_ARGS:---no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu}
      # Storage
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_LOCAL_PATH=/app/data/media
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-openwa}
      # Redis
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      # Webhook
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10000}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - WEBHOOK_RETRY_DELAY=${WEBHOOK_RETRY_DELAY:-5000}
      # Rate Limit
      - RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      # Plugins
      - PLUGINS_ENABLED=${PLUGINS_ENABLED:-true}
      - PLUGINS_DIR=/app/data/plugins
      # Security
      - API_MASTER_KEY=${API_MASTER_KEY:-}
      # Swagger
      - ENABLE_SWAGGER=${ENABLE_SWAGGER:-true}
    volumes:
      - openwa-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - coolify
    labels:
      # --- Traefik (Coolify) routing ---
      - 'traefik.enable=true'
      # HTTP Router
      - 'traefik.http.routers.openwa-api.rule=Host(`${API_HOST:-api-openwa.qwertyatlas.online}`)'
      - 'traefik.http.routers.openwa-api.entrypoints=http'
      - 'traefik.http.routers.openwa-api.service=openwa-api'
      # HTTPS Router
      - 'traefik.http.routers.openwa-api-secure.rule=Host(`${API_HOST:-api-openwa.qwertyatlas.online}`)'
      - 'traefik.http.routers.openwa-api-secure.entrypoints=https'
      - 'traefik.http.routers.openwa-api-secure.tls=true'
      - 'traefik.http.routers.openwa-api-secure.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.openwa-api-secure.service=openwa-api'
      # Service
      - 'traefik.http.services.openwa-api.loadbalancer.server.port=2785'
      # WebSocket support (for socket.io)
      - 'traefik.http.middlewares.openwa-ws.headers.customrequestheaders.Connection=Upgrade'
      - 'traefik.http.middlewares.openwa-ws.headers.customrequestheaders.Upgrade=websocket'
      - 'traefik.http.routers.openwa-api-secure.middlewares=openwa-ws'
      - 'traefik.http.routers.openwa-api.middlewares=openwa-ws'
      # Meta
      - 'com.openwa.service=api'
      - 'com.openwa.core=true'

  # ===== CORE: Dashboard Frontend =====
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - openwa-api
    networks:
      - internal
      - coolify
    labels:
      # --- Traefik (Coolify) routing ---
      - 'traefik.enable=true'
      # HTTP Router
      - 'traefik.http.routers.openwa-dashboard.rule=Host(`${DASHBOARD_HOST:-openwa.qwertyatlas.online}`)'
      - 'traefik.http.routers.openwa-dashboard.entrypoints=http'
      - 'traefik.http.routers.openwa-dashboard.service=openwa-dashboard'
      # HTTPS Router
      - 'traefik.http.routers.openwa-dashboard-secure.rule=Host(`${DASHBOARD_HOST:-openwa.qwertyatlas.online}`)'
      - 'traefik.http.routers.openwa-dashboard-secure.entrypoints=https'
      - 'traefik.http.routers.openwa-dashboard-secure.tls=true'
      - 'traefik.http.routers.openwa-dashboard-secure.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.openwa-dashboard-secure.service=openwa-dashboard'
      # Service
      - 'traefik.http.services.openwa-dashboard.loadbalancer.server.port=80'
      # Meta
      - 'com.openwa.service=dashboard'
      - 'com.openwa.core=true'

  # ===== CORE: PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: openwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-openwa}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-openwa}
      POSTGRES_DB: ${DATABASE_NAME:-openwa}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME:-openwa}']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    labels:
      - 'com.openwa.service=database'
      - 'com.openwa.builtin=true'

  # ===== OPTIONAL: Built-in Redis =====
  redis:
    image: redis:7-alpine
    container_name: openwa-redis
    profiles: ['redis']
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    labels:
      - 'com.openwa.service=cache'
      - 'com.openwa.builtin=true'

  # ===== OPTIONAL: Built-in MinIO (S3-compatible) =====
  minio:
    image: minio/minio
    container_name: openwa-minio
    profiles: ['minio']
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
    labels:
      - 'com.openwa.service=storage'
      - 'com.openwa.builtin=true'

volumes:
  openwa-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

networks:
  internal:
    name: openwa-internal
  coolify:
    external: true
